<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClashMaster - Painel de IA</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="sidebar">
        <div class="logo">
            <i class="fas fa-coins" style="color: #FFCC00;"></i>
            <h2>CLASHMASTER</h2>
        </div>

        <div class="menu-section">
            <p>INTELIGÊNCIA</p>
            <button class="menu-item active"><i class="fas fa-chart-pie"></i> Painel de IA</button>
            <button class="menu-item"><i class="fas fa-crosshairs"></i> Sugerimento de Ataque</button>
        </div>

        <div class="menu-section">
            <p>VILA PRINCIPAL</p>
            <button class="menu-item"><i class="fas fa-shield-alt"></i> Defesas & Armadilhas</button>
            <button class="menu-item"><i class="fas fa-coins"></i> Recursos</button>
            <button class="menu-item"><i class="fas fa-crown"></i> Heróis</button>
        </div>

        <div class="menu-section">
            <p>EXÉRCITO</p>
            <button class="menu-item"><i class="fas fa-tint"></i> Elixir Rosa</button>
            <button class="menu-item"><i class="fas fa-tint" style="color: #7d5bbe;"></i> Elixir Negro</button>
            <button class="menu-item"><i class="fas fa-bolt"></i> Super Tropas</button>
            <button class="menu-item"><i class="fas fa-truck-monster"></i> Máquinas de Cerco</button>
        </div>

        <div class="cv-selector">
            <p>CENTRO DE VILA ATUAL</p>
            <div class="controls">
                <button onclick="changeCV(-1)">-</button>
                <span id="cv-display">12</span>
                <button onclick="changeCV(1)">+</button>
            </div>
        </div>
    </div>

    <main class="content">
        <header>
            <h1 id="page-title">Painel de IA</h1>
        </header>
        <section id="main-display">
            <p>ANALISANDO...</p>
            <div id="data-container"></div>
        </section>
    </main>

    <script src="./js/app.js"></script>
</body>
</html>
